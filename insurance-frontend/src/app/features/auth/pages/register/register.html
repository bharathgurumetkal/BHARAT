<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6">
  <div class="w-full max-w-xl">
    <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-200">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-900">Create Account</h2>
        <p class="text-gray-500 mt-2">Join PropertyTrust for smart property protection</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
          <input
            type="text"
            formControlName="name"
            class="input-field w-full"
            placeholder="John Doe"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
          <input
            type="email"
            formControlName="email"
            class="input-field w-full"
            placeholder="example@mail.com"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
          <input
            type="tel"
            formControlName="phoneNumber"
            class="input-field w-full"
            placeholder="+1 234 567 890"
          />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input
            type="password"
            formControlName="password"
            class="input-field w-full"
            placeholder="Min 6 characters"
          />
        </div>

        <div *ngIf="errorMessage" class="md:col-span-2 p-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-lg text-center">
          {{ errorMessage }}
        </div>

        <div class="md:col-span-2 mt-4">
          <button
            type="submit"
            [disabled]="registerForm.invalid || isLoading"
            class="btn-primary w-full flex items-center justify-center gap-2"
          >
            <span *ngIf="isLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            {{ isLoading ? 'Creating account...' : 'Create Account' }}
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-500">
          Already have an account? 
          <a routerLink="/login" class="text-blue-600 font-bold hover:underline">Sign In</a>
        </p>
      </div>
    </div>
  </div>
</div>
