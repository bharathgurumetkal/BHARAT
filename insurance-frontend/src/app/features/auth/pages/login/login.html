<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6">
  <div class="w-full max-w-md">
    <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-200">
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <!-- Outer glow ring -->
          <div class="w-20 h-20 rounded-full bg-blue-50 flex items-center justify-center ring-4 ring-blue-100/50 ring-offset-2">
            <!-- Inner icon circle -->
            <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/30">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 11V7a4 4 0 00-8 0v4M5 11h14a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2z" />
              </svg>
            </div>
          </div>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">Sign In</h2>
        <p class="text-gray-500 mt-2">Enter your credentials to access your portal</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
          <input
            type="email"
            formControlName="email"
            class="input-field w-full"
            placeholder="example@mail.com"
          />
          <p *ngIf="isFieldInvalid('email')" class="text-red-500 text-xs mt-1">Include a valid email address</p>
        </div>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm font-semibold text-gray-700">Password</label>
            <a class="text-xs font-semibold text-blue-600 hover:text-blue-700 cursor-pointer">Forgot?</a>
          </div>
          <input
            type="password"
            formControlName="password"
            class="input-field w-full"
            placeholder="••••••••"
          />
          <p *ngIf="isFieldInvalid('password')" class="text-red-500 text-xs mt-1">Password is required</p>
        </div>

        <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-lg text-center">
          {{ errorMessage }}
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="btn-primary w-full flex items-center justify-center gap-2"
        >
          <span *ngIf="isLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          {{ isLoading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-500">
          Don't have an account? 
          <a routerLink="/register" class="text-blue-600 font-bold hover:underline">Create Account</a>
        </p>
      </div>
    </div>
    
    <div class="text-center mt-6">
      <a routerLink="/" class="text-gray-400 hover:text-gray-600 text-sm font-medium inline-flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Home
      </a>
    </div>
  </div>
</div>
