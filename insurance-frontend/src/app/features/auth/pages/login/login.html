<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 p-6 relative overflow-hidden">
  
  <!-- Decorative Background Elements -->
  <div class="absolute top-0 left-0 w-96 h-96 bg-blue-400/10 blur-[100px] rounded-full -translate-x-1/2 -translate-y-1/2"></div>
  <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-indigo-400/10 blur-[120px] rounded-full translate-x-1/4 translate-y-1/4"></div>

  <div class="w-full max-w-md relative z-10">
    <div class="login-card bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white/20">
      
      <div class="text-center mb-10">
        <div class="flex justify-center mb-6">
          <div class="w-20 h-20 rounded-3xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center shadow-xl shadow-blue-500/20 rotate-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 11V7a4 4 0 00-8 0v4M5 11h14a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2z" />
            </svg>
          </div>
        </div>
        <h2 class="text-3xl font-black text-slate-900 tracking-tight">Welcome Back</h2>
        <p class="text-slate-500 mt-3 font-medium">Log in to your secure insurance portal</p>
      </div>

      <!-- Error Notification -->
      <div *ngIf="errorMessage" class="mb-8 p-4 bg-red-50/80 border border-red-100 rounded-2xl flex items-start gap-3 shake-error">
        <div class="w-6 h-6 rounded-full bg-red-500/10 flex items-center justify-center flex-shrink-0 mt-0.5">
          <svg class="w-3.5 h-3.5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </div>
        <div class="flex-1">
          <p class="text-xs font-bold text-red-700 uppercase tracking-wider mb-0.5">Login Failed</p>
          <p class="text-sm text-red-600 leading-tight">{{ errorMessage }}</p>
        </div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div class="space-y-2">
          <label class="block text-sm font-bold text-slate-700 ml-1">Email Address</label>
          <div class="relative">
            <input
              type="email"
              formControlName="email"
              class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none text-slate-900 font-medium placeholder:text-slate-400"
              placeholder="name@example.com"
              [class.border-red-500]="isFieldInvalid('email')"
            />
          </div>
          <p *ngIf="isFieldInvalid('email')" class="text-red-500 text-xs font-bold ml-1">Please provide a valid email</p>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="text-sm font-bold text-slate-700">Password</label>
            <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-700 transition-colors">Forgot Password?</a>
          </div>
          <div class="relative">
            <input
              type="password"
              formControlName="password"
              class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none text-slate-900 font-medium placeholder:text-slate-400"
              placeholder="••••••••"
              [class.border-red-500]="isFieldInvalid('password')"
            />
          </div>
          <p *ngIf="isFieldInvalid('password')" class="text-red-500 text-xs font-bold ml-1">Password is required</p>
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold rounded-2xl transition-all duration-300 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 active:scale-[0.98] disabled:opacity-70 disabled:pointer-events-none flex items-center justify-center gap-3"
        >
          <span *ngIf="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          {{ isLoading ? 'Verifying Account...' : 'Continue to Dashboard' }}
        </button>
      </form>

      <div class="mt-8 pt-8 border-t border-slate-100 text-center">
        <p class="text-sm text-slate-500 font-medium">
          New to the portal? 
          <a routerLink="/register" class="text-blue-600 font-bold hover:text-blue-700 transition-colors ml-1">Create an account</a>
        </p>
      </div>
    </div>
    
    <div class="text-center mt-8">
      <a routerLink="/" class="text-slate-400 hover:text-slate-600 text-sm font-bold inline-flex items-center gap-2 group transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Return to Home Page
      </a>
    </div>
  </div>
</div>
