<header class="fixed top-0 right-0 h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 z-40 flex items-center justify-between px-8" style="left: 260px;">
  <div class="flex items-center gap-4">
    <h1 class="text-xl font-bold text-slate-800">Control Panel</h1>
    <div class="h-6 w-px bg-slate-200 mx-2"></div>
    <div class="text-sm text-slate-500 font-medium hidden md:block">
      {{ currentTime | date:'EEEE, MMM d, y' }}
    </div>
  </div>

  <div class="flex items-center gap-6">
    <!-- Search bar -->
    <div class="relative hidden lg:block">
      <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </span>
      <input type="text" placeholder="Search anything..." 
             class="pl-10 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all w-64 hover:border-slate-200">
    </div>

    <!-- Notification -->
    <div class="relative">
      <button (click)="toggleNotifications()" class="p-2 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group relative active:scale-90">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span *ngIf="unreadCount > 0" class="absolute top-2 right-2 flex h-4 w-4 items-center justify-center rounded-full bg-rose-500 text-[9px] font-black text-white border-2 border-white">
          {{ unreadCount }}
        </span>
      </button>

      <!-- Dropdown Panel -->
      <div *ngIf="showNotifications" class="absolute right-0 mt-4 w-80 bg-white rounded-2xl shadow-2xl border border-gray-100 py-2 z-50 animate-in slide-in-from-top-2 duration-300">
        <div class="px-5 py-3 border-b border-gray-50 flex items-center justify-between">
          <h3 class="text-sm font-bold text-gray-800">Notifications</h3>
          <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">{{ unreadCount }} New</span>
        </div>
        
        <div class="max-h-[350px] overflow-y-auto">
          <div *ngIf="latestNotifications.length === 0" class="py-12 text-center px-6">
            <p class="text-xs text-gray-400 font-medium">No notifications yet.</p>
          </div>

          <div *ngFor="let note of latestNotifications" 
               [class.bg-slate-50]="!note.isRead"
               class="px-5 py-4 border-b border-gray-50 hover:bg-gray-50 transition-colors relative group">
            <div class="flex gap-3 text-left">
              <div [ngClass]="{
                'bg-blue-100 text-blue-600': note.type === 'Info',
                'bg-emerald-100 text-emerald-600': note.type === 'Success',
                'bg-amber-100 text-amber-600': note.type === 'Warning',
                'bg-rose-100 text-rose-600': note.type === 'Risk'
              }" class="w-8 h-8 rounded-lg shrink-0 flex items-center justify-center font-bold text-xs uppercase">
                {{ note.type.substring(0,1) }}
              </div>
              <div class="space-y-1 overflow-hidden">
                <p class="text-[13px] font-bold text-gray-900 leading-tight truncate">{{ note.title }}</p>
                <p class="text-xs text-gray-500 leading-normal line-clamp-2">{{ note.message }}</p>
                <p class="text-[10px] text-gray-400 font-medium tracking-tight">{{ note.createdAt | date:'shortTime' : '+0530' }}</p>
              </div>
            </div>
            <button *ngIf="!note.isRead" (click)="markAsRead(note.id, $event)" 
                    class="absolute top-4 right-4 h-2 w-2 rounded-full bg-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity" title="Mark as read">
            </button>
          </div>
        </div>

        <div class="px-5 py-3 text-center border-t border-gray-50 bg-gray-50/50">
          <a routerLink="/admin/notifications" (click)="showNotifications = false" class="text-[11px] font-black text-indigo-600 uppercase tracking-widest hover:text-indigo-700 transition-colors">
            View All Activity
          </a>
        </div>
      </div>
    </div>

    <!-- Logout -->
    <button (click)="logout()" class="p-2 text-slate-500 hover:bg-rose-50 hover:text-rose-500 rounded-xl transition-all group active:scale-95" title="Sign out">
       <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
       </svg>
    </button>

    <!-- Settings -->
    <button class="p-2 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </button>
  </div>
</header>
