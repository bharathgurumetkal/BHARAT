<aside class="flex flex-col h-full w-full bg-white">
  <!-- Logo -->
  <div class="h-20 flex items-center px-8 border-b border-slate-50 flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <span class="text-xl font-bold text-slate-900">PropertyTrust</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto p-4 space-y-0.5">
    <div class="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
      {{ role() }} Menu
    </div>

    <a *ngFor="let item of menuItems()"
       [routerLink]="item.route"
       [ngClass]="isActive(item.route)
         ? 'bg-indigo-50 text-indigo-600 border-indigo-500 shadow-sm font-semibold'
         : 'text-slate-600 border-transparent hover:bg-slate-50 hover:text-slate-900 font-medium'"
       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-150 group border-l-4 cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg"
           [ngClass]="isActive(item.route) ? 'text-indigo-500' : 'text-slate-400 group-hover:text-slate-600'"
           class="h-5 w-5 flex-shrink-0 transition-colors duration-150"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
      </svg>
      <span class="text-sm truncate">{{ item.label }}</span>
      <span *ngIf="isActive(item.route)" class="ml-auto w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0"></span>
    </a>
  </nav>

  <!-- User profile + Logout -->
  <div class="p-4 border-t border-slate-100 flex-shrink-0">
    <div class="bg-slate-50 rounded-2xl p-3 mb-3 flex items-center gap-3">
      <div [ngClass]="roleColor()" class="w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
        {{ roleInitial() }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-bold text-slate-700 truncate">{{ userEmail() || 'User' }}</p>
        <p class="text-[10px] text-slate-400 font-medium">{{ role() }}</p>
      </div>
    </div>
    <button (click)="logout()"
            class="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl text-rose-600 hover:bg-rose-50 font-semibold transition-colors text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Sign Out
    </button>
  </div>
</aside>
